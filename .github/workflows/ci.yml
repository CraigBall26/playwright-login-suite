# CI Pipeline for Hudl Automation Suite
# -------------------------------------------------------------------
# This workflow keeps the project healthy by enforcing code quality
# and validating the stability of the automation framework. It runs
# two stages:
#
# 1. Framework Tests  – fast, stable checks that validate selectors,
#    page objects, login flow, and core UI structure.
#
# 2. Environment Tests – resilience checks that validate behaviour
#    under offline, slow‑network, and multi‑tab conditions.
#
# Framework tests run first. Environment tests only run if the
# framework layer is green, ensuring fast feedback and clean signals.
#
# Browsers run headless in CI. Pip packages and Playwright browser
# binaries are cached to keep runs fast.

name: Hudl Automation CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # Job 1: API Tests
  # -----------------------------------------------------------------
  # Fast, stateless HTTP-layer checks that run without a browser.
  # Validates service availability, redirect behaviour, and security
  # headers at the network level. Runs first — a failure here explains
  # why the entire UI suite would fail.
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api --disable-warnings

  # -----------------------------------------------------------------
  # Job 2: Framework Tests
  # -----------------------------------------------------------------
  # Validates the core automation layer: selectors, page objects,
  # login flow, and dashboard rendering. This is the foundation of
  # the suite and must pass before any deeper tests run.
  framework-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Python 3.12 to match local development
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Install Python dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Cache Playwright browser binaries — only re-download when requirements change
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ hashFiles('requirements.txt') }}

      # Install system-level browser dependencies (always needed, not cacheable)
      - name: Install Playwright system dependencies
        run: playwright install-deps webkit

      # Download browser binary only on cache miss
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install webkit

      # Linting: enforce code quality and formatting
      - name: Ruff lint (strict)
        run: ruff check . --exit-non-zero-on-fix

      - name: Ruff format check
        run: ruff format --check .

      # Run framework tests headless — no slow_mo, no xvfb needed
      - name: Run framework tests
        env:
          HUDL_EMAIL: ${{ secrets.HUDL_EMAIL }}
          HUDL_PASSWORD: ${{ secrets.HUDL_PASSWORD }}
        run: pytest -m framework --disable-warnings --maxfail=1

  # -----------------------------------------------------------------
  # Job 2: Environment Tests
  # -----------------------------------------------------------------
  # Runs only if framework tests pass. Validates behaviour under
  # offline mode, slow networks, and multi‑tab scenarios. These tests
  # are slower and more brittle by nature, so they run after the
  # foundation layer is confirmed healthy.
  environment-tests:
    runs-on: ubuntu-latest
    needs: framework-tests

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Python 3.12 to match local development
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Install Python dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Cache Playwright browser binaries — only re-download when requirements change
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-webkit-${{ hashFiles('requirements.txt') }}

      # Install system-level browser dependencies (always needed, not cacheable)
      - name: Install Playwright system dependencies
        run: playwright install-deps webkit

      # Download browser binary only on cache miss
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install webkit

      # Run environment tests headless — no slow_mo, no xvfb needed
      - name: Run environment tests
        env:
          HUDL_EMAIL: ${{ secrets.HUDL_EMAIL }}
          HUDL_PASSWORD: ${{ secrets.HUDL_PASSWORD }}
        run: pytest -m environment --disable-warnings --maxfail=1
