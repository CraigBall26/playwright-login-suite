# CI Pipeline for Hudl Automation Suite
# -------------------------------------------------------------------
# This workflow keeps the project healthy by enforcing code quality
# and validating the stability of the automation framework. It runs
# two stages:
#
# 1. Framework Tests  – fast, stable checks that validate selectors,
#    page objects, login flow, and core UI structure.
#
# 2. Environment Tests – resilience checks that validate behaviour
#    under offline, slow‑network, and multi‑tab conditions.
#
# Framework tests run first. Environment tests only run if the
# framework layer is green, ensuring fast feedback and clean signals.
#
# This workflow mirrors the local development workflow as closely as
# possible, including headed browser execution via xvfb.

name: Hudl Automation CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # Job 1: Framework Tests
  # -----------------------------------------------------------------
  # Validates the core automation layer: selectors, page objects,
  # login flow, and dashboard rendering. This is the foundation of
  # the suite and must pass before any deeper tests run.
  framework-tests:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Python 3.12 to match local development
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install Python dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Install Playwright browsers and system dependencies
      - name: Install Playwright browsers
        run: playwright install --with-deps

      # Linting: enforce code quality and formatting
      - name: Ruff lint (strict)
        run: ruff check . --exit-non-zero-on-fix

      - name: Ruff format check
        run: ruff format --check .

      # Run framework tests in headed mode using xvfb
      - name: Run framework tests (headed)
        env:
          HUDL_EMAIL: ${{ secrets.HUDL_EMAIL }}
          HUDL_PASSWORD: ${{ secrets.HUDL_PASSWORD }}
          PLAYWRIGHT_SPEEDUP: "1"
        run: |
          xvfb-run -a pytest -m framework --headed --disable-warnings --maxfail=1

  # -----------------------------------------------------------------
  # Job 2: Environment Tests
  # -----------------------------------------------------------------
  # Runs only if framework tests pass. Validates behaviour under
  # offline mode, slow networks, and multi‑tab scenarios. These tests
  # are slower and more brittle by nature, so they run after the
  # foundation layer is confirmed healthy.
  environment-tests:
    runs-on: ubuntu-latest
    needs: framework-tests

    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Use Python 3.12 to match local development
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install Python dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Install Playwright browsers and system dependencies
      - name: Install Playwright browsers
        run: playwright install --with-deps

      # Run environment tests in headed mode using xvfb
      - name: Run environment tests (headed)
        env:
          HUDL_EMAIL: ${{ secrets.HUDL_EMAIL }}
          HUDL_PASSWORD: ${{ secrets.HUDL_PASSWORD }}
          PLAYWRIGHT_SPEEDUP: "1"
        run: |
          xvfb-run -a pytest -m environment --headed --disable-warnings --maxfail=1
